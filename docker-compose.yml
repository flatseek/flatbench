version: "3.8"

services:
  typesense:
    image: typesense/typesense:27.1
    container_name: flatbench_typesense
    environment:
      - TYPESENSE_DATA_DIR=/typesense-data
      - TYPESENSE_API_KEY=xyz
    ports:
      - "8108:8108"
    volumes:
      - typesense_data:/typesense-data
    command: --data-dir /typesense-data --api-key xyz --port 8108
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8108/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - flatbench

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: flatbench-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=flatbench
      - node.name=flatbench-node-1
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - flatbench

  flatseek:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flatbench-flatseek
    environment:
      - FLATSEEK_PORT=8000
    ports:
      - "8000:8000"
    volumes:
      - flatseek_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - flatbench

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: flatbench-kibana
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_SECURITY_ENABLED=false
    ports:
      - "5601:5601"
    networks:
      - flatbench
    profiles:
      - dev  # Only start with: docker-compose --profile dev up

  zincsearch:
    image: public.ecr.aws/zinclabs/zincsearch:latest
    container_name: flatbench-zincsearch
    user: root
    environment:
      - ZINC_FIRST_ADMIN_USER=admin
      - ZINC_FIRST_ADMIN_PASSWORD=Complexpass#123
      - ZINC_DATA_PATH=/data
    ports:
      - "4080:4080"
    volumes:
      - zincsearch_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:4080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - flatbench

volumes:
  es_data:
    name: flatbench_es_data
  flatseek_data:
    name: flatbench_flatseek_data
  typesense_data:
    name: flatbench_typesense_data
  zincsearch_data:
    name: flatbench_zincsearch_data

networks:
  flatbench:
    name: flatbench_net
    driver: bridge