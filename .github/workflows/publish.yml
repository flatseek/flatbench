name: publish

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: production
        type: choice
        options:
          - production
          - preview

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Decide environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.target }}" = "preview" ]; then
            echo "vercel_env=preview" >> "$GITHUB_OUTPUT"
            echo "prod_flag="          >> "$GITHUB_OUTPUT"
          else
            echo "vercel_env=production" >> "$GITHUB_OUTPUT"
            echo "prod_flag=--prod"      >> "$GITHUB_OUTPUT"
          fi

      - name: Pull Vercel project config
        run: vercel pull --yes --environment=${{ steps.env.outputs.vercel_env }} --token="$VERCEL_TOKEN"

      - name: Build static site
        run: vercel build ${{ steps.env.outputs.prod_flag }} --token="$VERCEL_TOKEN"

      - name: Deploy
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt ${{ steps.env.outputs.prod_flag }} --token="$VERCEL_TOKEN")
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $url"

      - name: Summary
        run: |
          echo "### Deployed to ${{ steps.env.outputs.vercel_env }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "URL: ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
