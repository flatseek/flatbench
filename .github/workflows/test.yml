name: test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Smoke-test CLI
        run: |
          flatbench --version
          flatbench --help
          flatbench generate --help
          flatbench run --help
          flatbench compare --help
          flatbench serve --help

      - name: Validate static build
        run: |
          bash build.sh
          test -f public/index.html
          test -f public/output/index.json
          python3 -c "import json; d=json.load(open('public/output/index.json')); assert 'files' in d, d; print('manifest OK:', d['count'], 'reports')"

      - name: Upload built site
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: public/
          retention-days: 7
